<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gegenstand gefunden</title>
    <style>
        /* OPSEC: Komplett lokales CSS, keine externen Abhängigkeiten */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
            color: #1f2937; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }
        .card { 
            background: #ffffff; 
            padding: 30px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box;
        }
        .token-id {
            font-size: 0.85rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        h1 { 
            margin-top: 0; 
            font-size: 1.5rem; 
            color: #111827;
        }
        p { 
            line-height: 1.5; 
            color: #4b5563;
            margin-bottom: 25px;
        }
        .reward-badge {
            background-color: #fef2f2;
            color: #dc2626;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }
        /* Button Styling */
        .btn { 
            display: flex; 
            align-items: center;
            justify-content: center;
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 10px; 
            text-decoration: none; 
            color: white; 
            font-weight: 600; 
            font-size: 1rem;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        
        /* Markenfarben */
        .btn-whatsapp { background-color: #25D366; }
        .btn-phone { background-color: #3b82f6; }
        .btn-email { background-color: #6d4aff; }
        
        .emoji { margin-right: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="card">
        <div class="token-id">System Token: K1</div>
        <h1>Gegenstand gefunden?</h1>
        
        <div class="reward-badge">🏆 Finderlohn zugesichert</div>
        
        <p>Vielen Dank fürs Scannen! Dieser Gegenstand ist registriert.<br>Bitte kontaktieren Sie den Eigentümer über einen der folgenden Wege:</p>
        
        <!-- 1. WHATSAPP BUTTON -->
        <!-- WICHTIG: Die Nummer muss im internationalen Format OHNE "+" und OHNE "00" eingegeben werden. -->
        <!-- Beispiel für 079 123 45 67 -> 41791234567 -->
        <a href="https://wa.me/41784809594?text=Hallo,%20ich%20habe%20den%20Gegenstand%20gefunden!" class="btn btn-whatsapp">
            <span class="emoji">💬</span> WhatsApp Nachricht
        </a>

        <!-- 2. TELEFON BUTTON -->
        <!-- WICHTIG: Hier gehört das "+" zwingend davor! -->
        <!-- Beispiel: +41791234567 -->
        <a href="tel:+41784809594" class="btn btn-phone">
            <span class="emoji">📞</span> Direkt Anrufen
        </a>

        <!-- 3. E-MAIL BUTTON -->
        <!-- Setze hier deinen Proton Pass SimpleLogin Alias ein -->
        <a href="mailto:token.poet902@passinbox.com?subject=Gefundener%20Gegenstand%20(Token%20K1)" class="btn btn-email">
            <span class="emoji">✉️</span> E-Mail senden
        </a>

    </div>

</body>
</html>
